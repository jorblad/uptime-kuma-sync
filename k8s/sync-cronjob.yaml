---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uptime-kuma-ingress-sync
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: uptime-kuma-ingress-sync
rules:
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: uptime-kuma-ingress-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: uptime-kuma-ingress-sync
subjects:
- kind: ServiceAccount
  name: uptime-kuma-ingress-sync
  namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: uptime-kuma-ingress-sync
  namespace: kube-system
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: uptime-kuma-ingress-sync
          restartPolicy: OnFailure
          containers:
          - name: sync
            # Replace with a pinned image tag, e.g. ghcr.io/jorblad/uptime-kuma-sync:abc1234
            image: ghcr.io/jorblad/uptime-kuma-sync:latest
            env:
            - name: UPTIME_KUMA_BASE
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-secret
                  key: base_url
            - name: UPTIME_KUMA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-secret
                  key: api_token
